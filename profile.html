<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VELORA – Profile</title>

<style>
  * { box-sizing: border-box; }

  body {
      margin: 0;
      font-family: system-ui;
      background: radial-gradient(circle at top, #1a1a1a 0, #000000 55%);
      color: #fff;
  }
  .container {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0 56px;
  }

  .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
  }

  .home-btn {
      border: none;
      border-radius: 999px;
      background: linear-gradient(to right, #ff0040, #ff5277);
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 18px;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(255,0,64,0.8);
  }
  .home-btn:hover { filter: brightness(1.1); }

  .user-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #101010;
      border: 1px solid rgba(255,82,119,0.8);
      box-shadow: 0 0 14px rgba(255,0,64,0.7);
      font-size: 14px;
      cursor: pointer;
  }

  .user-icon {
      display:inline-block;
      width:14px;
      height:14px;
      border-radius:50%;
      background: radial-gradient(circle, #ff5277, #ff0040);
  }

  h1 {
      background: linear-gradient(to right, #ff0040, #ff5277);
      -webkit-background-clip: text;
      color: transparent;
      text-transform: uppercase;
      font-size: 28px;
      margin-bottom: 10px;
  }

  .card {
      background: #101010;
      border-radius: 18px;
      padding: 22px 24px;
      border: 1px solid rgba(255, 0, 64, 0.5);
      box-shadow: 0 0 18px rgba(255,0,64,0.45);
      margin-bottom: 22px;
  }
  h3 { color: #ff9fb8; margin-top: 0; }

  p {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
      margin: 4px 0;
  }

  #history p {
      margin: 2px 0;
  }

  .logout-btn {
      margin-top: 8px;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: #222;
      color: #ff9fb8;
      cursor: pointer;
      font-size: 12px;
  }
  .logout-btn:hover {
      background: #333;
  }
</style>
</head>

<body>
  <div class="container">
    <div class="header-top">
      <button class="home-btn" onclick="window.location.href='index.html'">← HOME</button>
      <div class="user-display" id="userDisplayHdr">
        <span class="user-icon"></span>
        <span id="usernameHdrText">User</span>
      </div>
    </div>

    <h1>Your Profile</h1>

    <section class="card">
        <h3>Account Details</h3>
        <p id="profileName">Name: —</p>
        <p id="profileEmail">Email: —</p>
        <button id="logoutBtn" class="logout-btn">Log out</button>

    </section>

    <section class="card">
        <h3>Latest Cycle Prediction</h3>
        <p id="latestCycle">—</p>
    </section>

    <section class="card">
        <h3>Saved Cycle History</h3>
        <div id="history"></div>
    </section>
  </div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, getDocs, orderBy, query }
  from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
  import { getApps } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAB70oNmm0u_nZmkWMwqn1zTt6VSC3TL1s",
    authDomain: "velora-5ecc4.firebaseapp.com",
    projectId: "velora-5ecc4",
    storageBucket: "velora-5ecc4.firebasestorage.app",
    messagingSenderId: "741786125820",
    appId: "1:741786125820:web:77ab1efe980f00bcdd5e79"
  };

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);

  const db = getFirestore(app);

  const nameEl = document.getElementById("profileName");
  const emailEl = document.getElementById("profileEmail");
  const latestCycleEl = document.getElementById("latestCycle");
  const historyDiv = document.getElementById("history");
  const headerNameEl = document.getElementById("usernameHdrText");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const userSnap = await getDoc(doc(db, "users", user.uid));
    if (userSnap.exists()) {
      const data = userSnap.data();
      nameEl.textContent = "Name: " + data.name;
      emailEl.textContent = "Email: " + data.email;
      headerNameEl.textContent = data.name;
    }

    loadCycleData(user.uid);
  });

  async function loadCycleData(uid) {
    historyDiv.innerHTML = "";
    latestCycleEl.textContent = "—";

    const q = query(
      collection(db, "users", uid, "cycles"),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      latestCycleEl.textContent = "No cycle data saved yet.";
      historyDiv.innerHTML = "<p>No past cycles recorded.</p>";
      return;
    }

    let first = true;

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      if (first) {
        latestCycleEl.textContent =
          `Next Period: ${data.nextPeriod} | Ovulation: ${data.ovulation}`;
        first = false;
      }

      const p = document.createElement("p");
      p.textContent = `• Next Period: ${data.nextPeriod}`;
      historyDiv.appendChild(p);
    });
  }

  window.logout = async function () {
  console.log("Logout clicked");
  await signOut(auth);
  window.location.href = "login.html";
};
window.logout = async () => {
  console.log("Logging out...");
  await signOut(auth);
  window.location.href = "login.html";
};
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", async () => {
  console.log("Logout pressed");

  try {
    await signOut(auth);
    console.log("Signed out");
    window.location.href = "login.html";
  } catch (e) {
    console.error("Logout failed", e);
  }
});

</script>
</body>
</html>
