<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA – Log In</title>

<style>
/* ---------------- GLOBAL BACKGROUND ---------------- */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("login-bg.jpg") center/cover no-repeat;
    position: relative;
}

/* Dark overlay to soften background */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(2px);
}

/* ---------------- LOGIN CARD ---------------- */
.login-card {
    position: relative;
    width: 430px;
    padding: 40px 35px;
    border-radius: 22px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 35px rgba(255, 0, 64, 0.35);
    text-align: center;
    color: #fff;
}

/* ---------------- TEXT STYLES ---------------- */
.logo-text {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(to right, #ff0040, #ff5277);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

.login-title {
    font-size: 24px;
    margin-bottom: 28px;
    color: #ffefef;
}

/* ---------------- INPUTS ---------------- */
.input-field {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    border-radius: 12px;
    border: none;
    background: rgba(255, 255, 255, 0.10);
    color: #fff;
    font-size: 15px;
}

.input-field::placeholder {
    color: #d8d8d8;
}

/* ---------------- BUTTON ---------------- */
.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: linear-gradient(to right, #ff0040, #ff5277);
    color: #fff;
    margin-top: 10px;
    box-shadow: 0 0 15px rgba(255, 0, 64, 0.5);
    transition: 0.25s;
}

.login-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(255, 0, 100, 0.7);
}

/* ---------------- SIGNUP LINK ---------------- */
.signup-link {
    margin-top: 18px;
    font-size: 14px;
    color: #dcdcdc;
}

.signup-link a {
    color: #ff5277;
    text-decoration: none;
    font-weight: bold;
}

.signup-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-card">
    <div class="logo-text">VELORA</div>
    <div class="login-title">Log in</div>

    <input type="email" id="email" class="input-field" placeholder="Email" />
    <input type="password" id="password" class="input-field" placeholder="Password" />

    <button class="login-btn" onclick="login()">Log in</button>

    <div class="signup-link">
        Don’t have an account? <a href="signup.html">Sign up</a>
    </div>
</div>

<script type="module">
  import {
    getAuth,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

  const auth = getAuth();

  // 👇 Matches onclick="login()"
  window.login = async function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Please enter email and password");
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Login successful!");
      window.location.href = "index.html";
    } catch (error) {
      alert("Invalid email or password");
    }
  };
</script>

</body>
</html>
